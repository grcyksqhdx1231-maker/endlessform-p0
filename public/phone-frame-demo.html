<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EndlessForm P0 Phone Demo</title>
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #ececec;
        color: #222222;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
      }

      body {
        display: grid;
        grid-template-rows: auto 1fr;
      }

      .toolbar {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        padding: 14px;
      }

      .toolbar button {
        height: 34px;
        padding: 0 12px;
        border: 1px solid rgba(0, 0, 0, 0.16);
        border-radius: 8px;
        background: #ffffff;
        color: #222222;
        font: inherit;
        cursor: pointer;
      }

      .toolbar button[aria-pressed="true"] {
        border-color: #222222;
      }

      .stage {
        display: grid;
        place-items: center;
        min-height: 0;
        padding: 0 20px 24px;
      }

      .phone {
        position: relative;
        width: calc(var(--phone-w) + 24px);
        height: calc(var(--phone-h) + 24px);
        border: 12px solid #101010;
        border-radius: 42px;
        background: #101010;
        box-shadow:
          0 24px 70px rgba(0, 0, 0, 0.26),
          inset 0 0 0 1px rgba(255, 255, 255, 0.1);
        overflow: hidden;
        transform: scale(var(--scale));
      }

      .speaker {
        position: absolute;
        z-index: 2;
        top: 8px;
        left: 50%;
        width: 78px;
        height: 20px;
        transform: translateX(-50%);
        border-radius: 999px;
        background: #101010;
      }

      iframe {
        position: absolute;
        inset: 12px;
        width: var(--phone-w);
        height: var(--phone-h);
        border: 0;
        border-radius: 30px;
        background: #ffffff;
      }

      @media (max-height: 880px), (max-width: 520px) {
        :root {
          --scale: 0.78;
        }
      }

      @media (min-height: 881px) and (min-width: 521px) {
        :root {
          --scale: 0.9;
        }
      }

      :root {
        --phone-w: 393px;
        --phone-h: 852px;
        --scale: 0.9;
      }
    </style>
  </head>
  <body>
    <nav class="toolbar" aria-label="手机尺寸">
      <button type="button" data-size="375x812">375×812</button>
      <button type="button" data-size="393x852" aria-pressed="true">393×852</button>
      <button type="button" data-size="430x932">430×932</button>
    </nav>
    <main class="stage">
      <section class="phone" aria-label="手机外框预览">
        <div class="speaker" aria-hidden="true"></div>
        <iframe id="preview" title="EndlessForm P0 mobile preview"></iframe>
      </section>
    </main>
    <script>
      const root = document.documentElement;
      const frame = document.querySelector("#preview");
      const buttons = [...document.querySelectorAll("[data-size]")];
      const url = new URL(window.location.href);
      const target = url.searchParams.get("target") || "/";

      function setSize(size) {
        const [width, height] = size.split("x").map(Number);
        root.style.setProperty("--phone-w", `${width}px`);
        root.style.setProperty("--phone-h", `${height}px`);
        frame.width = String(width);
        frame.height = String(height);
        buttons.forEach((button) => {
          button.setAttribute("aria-pressed", String(button.dataset.size === size));
        });
      }

      buttons.forEach((button) => {
        button.addEventListener("click", () => setSize(button.dataset.size));
      });

      setSize("393x852");
      frame.src = target;
    </script>
  </body>
</html>
